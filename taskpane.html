<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeAI智能助手</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 0;
      overflow: hidden;
    }

    /* ═══ 页面容器 ═══ */
    .page {
      display: none;
      flex-direction: column;
      height: 100vh;
      padding: 14px 14px 10px 14px;
      overflow-y: auto;
    }
    .page.active { display: flex; }

    /* ═══ Header ═══ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #0078d4;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header .icon-btn {
      background: none;
      border: 1px solid #c8c8c8;
      border-radius: 4px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      color: #555;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 3px;
      font-family: inherit;
      font-size: 12px;
    }
    .header .icon-btn:hover { background: #f0f0f0; }
    .header .icon-btn .gear { font-size: 15px; }

    /* ═══ 通用区块 ═══ */
    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .section:last-child { margin-bottom: 0; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .section-title .dot {
      width: 6px; height: 6px; border-radius: 50%; display: inline-block;
    }
    .dot.blue { background: #0078d4; }
    .dot.green { background: #107c10; }
    .dot.orange { background: #d83b01; }

    /* ═══ 表单 ═══ */
    .form-row { margin-bottom: 7px; }
    .form-row:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 11px;
      color: #555;
      margin-bottom: 2px;
      font-weight: 500;
    }
    select, input[type="text"], input[type="password"], textarea {
      width: 100%;
      padding: 5px 7px;
      font-size: 12px;
      font-family: inherit;
      border: 1px solid #c8c8c8;
      border-radius: 2px;
      background: #fff;
      color: #1a1a1a;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 1px #0078d4;
    }
    textarea { resize: vertical; min-height: 52px; }

    .password-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .password-wrap input { padding-right: 30px; }
    .password-wrap .eye-btn {
      position: absolute; right: 2px;
      background: none; border: none;
      cursor: pointer; font-size: 14px;
      padding: 4px; color: #888;
    }
    .eye-btn:hover { color: #333; }

    /* ═══ 按钮 ═══ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 500;
      border: 1px solid #c8c8c8;
      border-radius: 2px;
      cursor: pointer;
      background: #fff;
      color: #1a1a1a;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #f0f0f0; }
    .btn:active { background: #e0e0e0; }
    .btn.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    .btn.primary:hover { background: #106ebe; }
    .btn.success { background: #107c10; color: #fff; border-color: #107c10; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.small { padding: 3px 8px; font-size: 10px; }

    .btn-row { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
    .btn-row.stretch .btn { flex: 1; }

    /* ═══ 排版预设按钮 ═══ */
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .preset-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      font-size: 11px;
      font-family: inherit;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background: #fafafa;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      color: #333;
    }
    .preset-btn:hover { background: #e8f4ff; border-color: #0078d4; color: #0078d4; }
    .preset-btn .emoji { font-size: 14px; flex-shrink: 0; }

    /* ═══ 温度滑块 ═══ */
    .temp-row {
      display: flex; align-items: center; gap: 8px;
    }
    .temp-row input[type="range"] {
      flex: 1; accent-color: #0078d4;
    }
    .temp-val {
      min-width: 32px; text-align: right;
      font-weight: 600; font-size: 12px;
    }

    /* ═══ 状态 ═══ */
    .status {
      margin-top: 7px;
      padding: 5px 7px;
      font-size: 11px;
      border-radius: 2px;
      display: none;
      line-height: 1.5;
    }
    .status.success { display: block; background: #dff6dd; color: #1e7e34; border: 1px solid #bae0ba; }
    .status.error   { display: block; background: #fde7e9; color: #a4262c; border: 1px solid #f5c6c9; }
    .status.info    { display: block; background: #e7f0fe; color: #004e8c; border: 1px solid #c5d9f1; }
    .status.warn    { display: block; background: #fff8e5; color: #6b4c00; border: 1px solid #ffe5a3; }

    /* ═══ 加载动画 ═══ */
    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid #c8c8c8;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ 返回按钮 ═══ */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      color: #0078d4;
      padding: 2px 4px;
    }
    .back-btn:hover { text-decoration: underline; }

    /* ═══ 提示文字 ═══ */
    .hint {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
      line-height: 1.4;
    }
    .hint a { color: #0078d4; }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 10px 0;
    }

    .footer {
      margin-top: auto;
      padding-top: 8px;
      font-size: 10px;
      color: #999;
      text-align: center;
      flex-shrink: 0;
    }

    /* ═══ 模型列表加载状态 ═══ */
    #modelListGroup { display: none; }
    #modelListGroup.visible { display: block; }

    /* ═══ 进度条 ═══ */
    .format-progress {
      display: none;
      margin-top: 6px;
    }
    .format-progress.active { display: block; }
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0078d4, #00b7c3);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
      text-align: center;
    }

    /* ═══ 已保存提示 ═══ */
    .saved-toast {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #107c10;
      color: #fff;
      padding: 5px 14px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 10;
    }
    .saved-toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- 保存提示 -->
  <div class="saved-toast" id="savedToast">&#10003; 已保存</div>

  <!-- ═══════════════════════════════════════════ -->
  <!--  主界面 (Page 1)                            -->
  <!-- ═══════════════════════════════════════════ -->
  <div class="page active" id="mainPage">

    <!-- Header -->
    <div class="header">
      <h1>&#10002; OfficeAI</h1>
      <button class="icon-btn" id="openSettingsBtn" title="大模型配置">
        <span class="gear">&#9881;</span> 设置
      </button>
    </div>

    <!-- 文档读取区 -->
    <div class="section">
      <div class="section-title"><span class="dot blue"></span> 文档读取</div>
      <div class="btn-row">
        <button class="btn" id="readFullDocBtn">&#128196; 读取全文</button>
        <button class="btn" id="extractSelectionBtn">&#128203; 提取选区</button>
        <span class="spinner" id="readSpinner"></span>
      </div>
      <textarea id="documentText" rows="4"
        placeholder="点击"读取全文"获取整个文档内容，或"提取选区"获取选中文字。也可以直接粘贴文本..."></textarea>
    </div>

    <!-- 排版格式区 -->
    <div class="section">
      <div class="section-title"><span class="dot orange"></span> 排版格式</div>
      <div class="preset-grid">
        <button class="preset-btn" data-preset="format_title">
          <span class="emoji">&#128220;</span> 标题加粗居中
        </button>
        <button class="preset-btn" data-preset="format_indent">
          <span class="emoji">&#128221;</span> 正文首行缩进
        </button>
        <button class="preset-btn" data-preset="format_spacing">
          <span class="emoji">&#9776;</span> 段落间距调整
        </button>
        <button class="preset-btn" data-preset="format_font">
          <span class="emoji">&#128396;</span> 正文字号行距
        </button>
        <button class="preset-btn" data-preset="polish">
          <span class="emoji">&#10024;</span> 校对润色
        </button>
        <button class="preset-btn" data-preset="translate_cn2en">
          <span class="emoji">&#127758;</span> 中译英
        </button>
        <button class="preset-btn" data-preset="translate_en2cn">
          <span class="emoji">&#127758;</span> 英译中
        </button>
        <button class="preset-btn" data-preset="summarize">
          <span class="emoji">&#128196;</span> 生成摘要
        </button>
      </div>
    </div>

    <!-- 一键智能排版（AI 语义分析 + Office.js 原生执行） -->
    <div class="section">
      <div class="section-title"><span class="dot green"></span> 一键智能排版</div>
      <button class="btn primary" id="autoFormatBtn" style="width:100%;">
        &#128208; 一键智能排版
      </button>
      <span class="spinner" id="autoFormatSpinner"></span>
      <div class="format-progress" id="formatProgress">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="formatProgressBar"></div>
        </div>
        <div class="progress-text" id="formatProgressText">准备中...</div>
      </div>
      <div class="status" id="formatStatus"></div>
    </div>

    <!-- AI 自定义指令 -->
    <div class="section">
      <div class="section-title"><span class="dot green"></span> AI 指令</div>
      <textarea id="instructionInput" rows="2"
        placeholder="输入自定义指令，例如：将第三段改为疑问句、检查语法错误、把数据改成表格..."></textarea>
      <div class="btn-row stretch">
        <button class="btn primary" id="executeBtn">&#9654; 执行</button>
        <button class="btn success" id="insertBtn" style="display:none;">&#128190; 插入文档</button>
      </div>
      <div class="status" id="mainStatus"></div>
    </div>

    <!-- 待处理结果预览（隐藏） -->
    <div class="section" id="resultSection" style="display:none;">
      <div class="section-title"><span class="dot green"></span> AI 处理结果</div>
      <textarea id="resultText" rows="4" readonly
        placeholder="AI 处理结果将显示在这里..."></textarea>
      <div class="btn-row stretch">
        <button class="btn success" id="replaceBtn">&#8634; 替换选区</button>
        <button class="btn" id="appendBtn">&#10010; 追加到文末</button>
      </div>
    </div>

    <div class="footer">OfficeAI v1.9 &mdash; DeepSeek API</div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!--  设置界面 (Page 2)                          -->
  <!-- ═══════════════════════════════════════════ -->
  <div class="page" id="settingsPage">

    <!-- Header with back button -->
    <div class="header">
      <button class="back-btn" id="backToMainBtn">
        &#8592; 返回
      </button>
      <h1>&#9881; 大模型配置</h1>
    </div>

    <!-- 服务商选择 -->
    <div class="section">
      <div class="form-row">
        <label for="modelProvider">模型服务商</label>
        <select id="modelProvider">
          <option value="deepseek">DeepSeek API（推荐）</option>
          <option value="ollama">本地 Ollama</option>
          <option value="custom">自定义 OpenAI 兼容 API</option>
        </select>
      </div>
    </div>

    <!-- API 连接配置 -->
    <div class="section">
      <div class="section-title"><span class="dot blue"></span> 连接配置</div>

      <div class="form-row">
        <label for="apiBaseUrl">API 地址 (Base URL)</label>
        <input type="text" id="apiBaseUrl"
               placeholder="https://api.deepseek.com">
        <div class="hint">DeepSeek: api.deepseek.com | 硅基流动: api.siliconflow.cn/v1</div>
      </div>

      <div class="form-row">
        <label for="apiKey">API Key</label>
        <div class="password-wrap">
          <input type="password" id="apiKey" placeholder="sk-...">
          <button class="eye-btn" id="toggleKeyBtn">&#128065;</button>
        </div>
        <div class="hint">从 platform.deepseek.com → API Keys 获取</div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="fetchModelsBtn">&#128269; 获取模型列表</button>
        <span class="spinner" id="fetchModelsSpinner"></span>
      </div>
      <div class="status" id="fetchModelsStatus"></div>
    </div>

    <!-- 模型选择 -->
    <div class="section" id="modelListGroup">
      <div class="section-title"><span class="dot green"></span> 模型选择</div>
      <div class="form-row">
        <label for="modelSelect">当前模型</label>
        <select id="modelSelect">
          <option value="">请先获取模型列表...</option>
        </select>
      </div>
      <div class="hint" id="modelCountHint"></div>

      <!-- Ollama 手动输入（Ollama 模式下显示） -->
      <div class="form-row" id="ollamaModelRow" style="display:none;">
        <label for="ollamaModelInput">模型名称</label>
        <input type="text" id="ollamaModelInput"
               placeholder="例如: deepseek-r1:latest, qwen3:14b">
      </div>
    </div>

    <!-- 参数配置 -->
    <div class="section">
      <div class="section-title"><span class="dot orange"></span> 生成参数</div>

      <div class="form-row">
        <label>Temperature: <span id="tempDisplay">0.7</span></label>
        <div class="temp-row">
          <span style="font-size:10px;color:#888;">严谨</span>
          <input type="range" id="temperatureSlider" min="0" max="20" value="7" step="1">
          <span style="font-size:10px;color:#888;">创意</span>
        </div>
      </div>

      <div class="form-row">
        <label for="systemPromptInput">System Prompt（全局 AI 指令）</label>
        <textarea id="systemPromptInput" rows="2"
          placeholder="定义 AI 的角色和行为模式..."></textarea>
      </div>
    </div>

    <!-- 排版参数（原生） -->
    <div class="section">
      <div class="section-title"><span class="dot green"></span> 排版参数（原生）</div>

      <div class="form-row">
        <label for="formatCnFont">中文字体</label>
        <input type="text" id="formatCnFont" placeholder="微软雅黑">
      </div>

      <div class="form-row">
        <label for="formatEnFont">英文字体</label>
        <input type="text" id="formatEnFont" placeholder="Times New Roman">
      </div>

      <div class="form-row">
        <label for="formatFontSize">正文字号 (pt)</label>
        <input type="text" id="formatFontSize" placeholder="12">
        <div class="hint">标准小四号为 12pt</div>
      </div>

      <div class="form-row">
        <label for="formatLineSpacing">行距倍数</label>
        <input type="text" id="formatLineSpacing" placeholder="1.5">
        <div class="hint">1.0 = 单倍, 1.5 = 1.5倍, 2.0 = 双倍</div>
      </div>

      <div class="form-row">
        <label for="formatIndent">首行缩进（字符数）</label>
        <input type="text" id="formatIndent" placeholder="2">
      </div>

      <div class="form-row">
        <label>
          <input type="checkbox" id="formatCnEnSpacing" checked style="width:auto;margin-right:4px;">
          启用中英文间自动加空格
        </label>
      </div>

      <div class="form-row">
        <label>
          <input type="checkbox" id="formatRemoveEmpty" checked style="width:auto;margin-right:4px;">
          自动清除连续空行
        </label>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="formatSaveBtn">&#128190; 保存排版参数</button>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="section">
      <div class="btn-row stretch">
        <button class="btn primary" id="saveSettingsBtn">&#128190; 保存配置</button>
        <button class="btn" id="testConnBtn">&#9889; 测试连接</button>
      </div>
      <div class="status" id="settingsStatus"></div>
    </div>

    <div class="footer">配置自动保存到本地浏览器存储</div>
  </div>

  <script src="taskpane.js?v=1.9"></script>
</body>
</html>
